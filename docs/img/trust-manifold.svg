<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" style="font-family: sans-serif; background: #ffffff;">
  <!-- Background label -->
  <rect x="20" y="10" width="640" height="370" rx="16" fill="none" stroke="#cccccc" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="36" y="32" font-size="12" fill="#888888">Phi-weighted representation space</text>

  <!-- Trust manifold M band -->
  <path d="M60 300 Q200 170 340 210 Q460 250 620 150" fill="none" stroke="#1D9E75" stroke-width="3" opacity="0.5"/>
  <path d="M60 325 Q200 195 340 235 Q460 275 620 175" fill="none" stroke="#1D9E75" stroke-width="1" opacity="0.25"/>
  <path d="M60 300 Q200 170 340 210 Q460 250 620 150 L620 175 Q460 275 340 235 Q200 195 60 325 Z" fill="#1D9E75" opacity="0.07"/>
  <text x="220" y="162" font-size="13" font-weight="600" fill="#0F6E56">Trust manifold M</text>
  <text x="220" y="178" font-size="11" fill="#0F6E56">mutually consistent value directions</text>

  <!-- Aligned value directions (on M) -->
  <circle cx="310" cy="222" r="7" fill="#1D9E75" opacity="0.9"/>
  <circle cx="345" cy="212" r="6" fill="#1D9E75" opacity="0.75"/>
  <circle cx="378" cy="225" r="6" fill="#1D9E75" opacity="0.75"/>
  <text x="310" y="252" font-size="11" fill="#0F6E56" text-anchor="middle">trust</text>
  <text x="345" y="196" font-size="11" fill="#0F6E56" text-anchor="middle">care</text>
  <text x="378" y="252" font-size="11" fill="#0F6E56" text-anchor="middle">autonomy</text>
  <text x="344" y="285" font-size="11" fill="#888888" text-anchor="middle">geodesic distance ≈ 0 → aligned</text>

  <!-- Misaligned value directions (far from M) -->
  <circle cx="155" cy="95" r="7" fill="#E24B4A" opacity="0.9"/>
  <circle cx="120" cy="128" r="6" fill="#E24B4A" opacity="0.75"/>
  <circle cx="188" cy="80" r="6" fill="#E24B4A" opacity="0.75"/>
  <text x="155" y="75" font-size="11" fill="#A32D2D" text-anchor="middle">harm</text>
  <text x="100" y="148" font-size="11" fill="#A32D2D" text-anchor="middle">deception</text>
  <text x="210" y="76" font-size="11" fill="#A32D2D" text-anchor="middle">"trust"?</text>

  <!-- Geodesic distance lines from misaligned to M -->
  <line x1="155" y1="95" x2="210" y2="232" stroke="#E24B4A" stroke-width="1" stroke-dasharray="5 3" opacity="0.5"/>
  <line x1="188" y1="80" x2="258" y2="222" stroke="#E24B4A" stroke-width="1" stroke-dasharray="5 3" opacity="0.35"/>
  <text x="166" y="178" font-size="11" fill="#A32D2D" text-anchor="middle">geodesic</text>
  <text x="166" y="192" font-size="11" fill="#A32D2D" text-anchor="middle">distance d</text>

  <!-- Inconsistency arrow between misaligned directions -->
  <path d="M155 100 Q168 114 122 128" fill="none" stroke="#E24B4A" stroke-width="1" stroke-dasharray="2 2" opacity="0.5"/>
  <text x="176" y="122" font-size="11" fill="#A32D2D">inconsistent</text>

  <!-- Value drift arrow (parallel transport) -->
  <path d="M420 220 Q480 204 530 168" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.7" marker-end="url(#arrowAmber)"/>
  <text x="488" y="208" font-size="11" fill="#854F0B" text-anchor="middle">value drift</text>
  <text x="488" y="222" font-size="11" fill="#854F0B" text-anchor="middle">(parallel transport)</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Legend -->
  <circle cx="36" cy="366" r="5" fill="#1D9E75"/>
  <text x="48" y="370" font-size="11" fill="#444444">on / near M → aligned</text>
  <circle cx="190" cy="366" r="5" fill="#E24B4A"/>
  <text x="202" y="370" font-size="11" fill="#444444">far from M → misaligned</text>
  <line x1="360" y1="366" x2="382" y2="366" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="388" y="370" font-size="11" fill="#444444">drift over fine-tuning</text>
</svg>
