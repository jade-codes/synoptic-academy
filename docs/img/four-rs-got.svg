<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" style="font-family: sans-serif; background: #ffffff;">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrDash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- R1: Rapid (top left) -->
  <rect x="40" y="40" width="180" height="90" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="130" y="68" font-size="14" font-weight="600" fill="#085041" text-anchor="middle">Rapid</text>
  <text x="130" y="88" font-size="11" fill="#0F6E56" text-anchor="middle">Prototype without rigour</text>
  <text x="130" y="104" font-size="11" fill="#0F6E56" text-anchor="middle">Get Phi computing, any shape</text>

  <!-- R2: Rigour (top right) -->
  <rect x="460" y="40" width="180" height="90" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="550" y="68" font-size="14" font-weight="600" fill="#26215C" text-anchor="middle">Rigour</text>
  <text x="550" y="88" font-size="11" fill="#534AB7" text-anchor="middle">Intentional design</text>
  <text x="550" y="104" font-size="11" fill="#534AB7" text-anchor="middle">Define GoT core API properly</text>

  <!-- R3: Refactor (bottom right) -->
  <rect x="460" y="280" width="180" height="90" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="550" y="308" font-size="14" font-weight="600" fill="#26215C" text-anchor="middle">Refactor</text>
  <text x="550" y="328" font-size="11" fill="#534AB7" text-anchor="middle">Validate with tests</text>
  <text x="550" y="344" font-size="11" fill="#534AB7" text-anchor="middle">Compare Phi vs numpy ref</text>

  <!-- R4: Repeat (bottom left) -->
  <rect x="40" y="280" width="180" height="90" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="130" y="308" font-size="14" font-weight="600" fill="#085041" text-anchor="middle">Repeat</text>
  <text x="130" y="328" font-size="11" fill="#0F6E56" text-anchor="middle">Next concept / probe</text>
  <text x="130" y="344" font-size="11" fill="#0F6E56" text-anchor="middle">Expand GoT coverage</text>

  <!-- Centre: Invariants -->
  <rect x="240" y="158" width="200" height="94" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="340" y="182" font-size="13" font-weight="600" fill="#633806" text-anchor="middle">Invariants</text>
  <text x="340" y="202" font-size="11" fill="#854F0B" text-anchor="middle">ARCHITECTURE.md</text>
  <text x="340" y="218" font-size="11" fill="#854F0B" text-anchor="middle">TODO.md context</text>
  <text x="340" y="234" font-size="11" fill="#854F0B" text-anchor="middle">Claude Sonnet pair</text>

  <!-- Arrows between Rs -->
  <line x1="220" y1="85" x2="458" y2="85" stroke="#888888" stroke-width="1" marker-end="url(#arr)"/>
  <text x="340" y="76" font-size="11" fill="#888888" text-anchor="middle">Phi computes end-to-end</text>

  <line x1="550" y1="132" x2="550" y2="278" stroke="#888888" stroke-width="1" marker-end="url(#arr)"/>
  <text x="568" y="210" font-size="11" fill="#888888">API solid,</text>
  <text x="568" y="224" font-size="11" fill="#888888">tests written</text>

  <line x1="458" y1="325" x2="222" y2="325" stroke="#888888" stroke-width="1" marker-end="url(#arr)"/>
  <text x="340" y="316" font-size="11" fill="#888888" text-anchor="middle">probe validated vs numpy</text>

  <line x1="130" y1="278" x2="130" y2="132" stroke="#888888" stroke-width="1" marker-end="url(#arr)"/>
  <text x="22" y="210" font-size="11" fill="#888888" text-anchor="middle">next</text>
  <text x="22" y="224" font-size="11" fill="#888888" text-anchor="middle">concept</text>

  <!-- Dashed lines from invariants to corners -->
  <line x1="240" y1="205" x2="222" y2="130" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="440" y1="205" x2="460" y2="130" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="440" y1="235" x2="460" y2="280" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="240" y1="235" x2="222" y2="280" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="3 3"/>
</svg>
